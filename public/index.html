<!DOCTYPE html>
<html>
<head>
  <title>AI Delivery Optimizer</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI";
      color: white;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .demo {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="box">

  <h2> AI Delivery</h2>

  <input id="email" value="admin">
  <input id="password" type="password" value="123">

  <button onclick="login()">Login</button>

  <div class="demo">
    Demo Login:<br>
    Email: <b>admin</b><br>
    Password: <b>123</b>
  </div>

</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/auth/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = "/app.html";
  } else {
    alert("Login failed ❌");
  }
}
</script>

</body>
</html>
