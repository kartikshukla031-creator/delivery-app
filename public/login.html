<!DOCTYPE html>
<html>
<head>
  <title>Login - AI Delivery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ff7a18, #ff3c00);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* 📱 Mobile responsive */
    @media(max-width: 500px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚚 AI Delivery</h1>
  <p>Smart route optimization with map & AI system</p>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <div class="footer">
    🚀 Project Features:<br>
    • Map-based delivery system<br>
    • Route optimization algorithm<br>
    • AI-based explanation (smart logic)<br>
    • Mobile responsive UI
  </div>
</div>

<script>
async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  await fetch("/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  alert("Registered ✅");
}

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const text = await res.text();

  if (text === "success") {
    window.location.href = "/";
  } else {
    alert("Wrong credentials ❌");
  }
}
</script>

</body>
</html>
